repos:
  - id: ztinfra-enclaveproducedhtml
    name: ZTInfra Enclave Produced HTML
    workload_repo_url: https://github.com/rusyaew/ztinfra-enclaveproducedhtml
    description: Canonical enclave-produced HTML workload released from the dedicated enclave repo.
    release_source:
      type: github_releases
    orchestration_repo_root: auto
    methods:
      - id: aws_canonical
        label: AWS Canonical Nitro
        adapter: aws_canonical
        status: active
        description: Reuse the AWS CLI Nitro automation in this repo to deploy a tagged enclave release to EC2.
        defaults:
          aws_profile: ztbrowser
          release_tag: v0.1.3
          remote_ref: origin/main
          cleanup_mode: terminate
