<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>ZTBrowser</title>
    <style>
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
        margin: 0;
        padding: 12px;
        min-width: 320px;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 10px;
      }
      .row {
        margin: 6px 0;
        font-size: 13px;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        word-break: break-all;
      }
      #debug {
        white-space: pre-wrap;
        font-size: 11px;
        max-height: 240px;
        overflow: auto;
        border-top: 1px solid #ddd;
        padding-top: 8px;
        margin-top: 8px;
      }
      .ok { color: #0b7a30; }
      .bad { color: #b42318; }
    </style>
  </head>
  <body>
    <h1>ZTBrowser</h1>
    <div id="status" class="row">Status: unknown</div>
    <div id="reason" class="row">Reason: n/a</div>
    <div id="facts" class="row">Facts match: n/a</div>
    <div id="repo" class="row mono"></div>
    <div id="digest" class="row mono"></div>
    <div id="pcrs" class="row mono"></div>
    <div id="debug" class="row mono"></div>
    <script src="popup.js"></script>
  </body>
</html>
